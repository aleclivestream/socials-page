<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Socials</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Manrope:wght@700;800&family=Archivo+Black&family=Poppins:wght@600;700&family=Cinzel:wght@600;700&family=Oswald:wght@500;700&display=swap');

:root{
  --bg:#0a0a0a;
  --surface:#141414;
  --line:#2a2a2a;
  --text:#f3f2ee;
  --muted:#8f8d87;
  --red:#c8202a;
  --red-dim:#5e1015;
}

*{box-sizing:border-box; margin:0; padding:0;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  padding:64px 24px 80px;
}

.wrap{max-width:560px; margin:0 auto; text-align:center;}

h1{
  font-family:'Anton',sans-serif;
  font-weight:400;
  transform:skewX(-6deg);
  font-size:clamp(56px,12vw,108px);
  line-height:.85;
  letter-spacing:.01em;
  color:var(--text);
}
h1 span{color:var(--red);}

.divider{
  margin:40px auto 48px;
  height:3px;
  width:100%;
  background:linear-gradient(90deg, transparent, var(--red) 35%, var(--red) 65%, transparent);
}

.cards{display:flex; flex-direction:column; gap:18px;}

.card{
  position:relative;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:4px;
  padding:30px 24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-decoration:none;
  color:inherit;
  overflow:hidden;
  transition:border-color .25s ease, transform .25s ease;
}
.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 50% 0%, var(--red-dim) 0%, transparent 60%);
  opacity:.45;
  pointer-events:none;
}
.card:hover{
  border-color:var(--red);
  transform:translateY(-2px);
}

.icon{
  position:relative;
  z-index:1;
  margin-bottom:14px;
  line-height:1;
}
.icon svg{width:34px; height:34px; fill:var(--red); display:block;}

.icon-pair{
  position:relative;
  z-index:1;
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:14px;
}
.icon-pair svg{width:30px; height:30px; fill:var(--red); display:block;}
.icon-pair .plus{
  font-family:'JetBrains Mono',monospace;
  color:var(--muted);
  font-size:16px;
}

.shared-note{
  position:relative;
  z-index:1;
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  letter-spacing:.1em;
  color:var(--muted);
  margin-top:6px;
}

.card-tag{
  position:relative;
  z-index:1;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:.2em;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:8px;
}

.card-val{
  position:relative;
  z-index:1;
  font-family:'Rajdhani',sans-serif;
  font-weight:700;
  font-size:28px;
  letter-spacing:.04em;
  text-transform:uppercase;
}

/* Discord — geometric/rounded, close to their "gg sans" UI face */
.val-discord{
  font-family:'Manrope', sans-serif;
  font-weight:800;
  text-transform:none;
  letter-spacing:.01em;
}

/* TikTok — loud, chunky, caption-style black weight */
.val-tiktok{
  font-family:'Archivo Black', sans-serif;
  font-weight:400;
  text-transform:uppercase;
  letter-spacing:.03em;
}

/* Instagram — clean rounded grotesque, handles read lowercase */
.val-instagram{
  font-family:'Poppins', sans-serif;
  font-weight:600;
  text-transform:none;
}

/* split value row for the combined League/Valorant card */
.val-split{
  display:flex;
  align-items:baseline;
  justify-content:center;
  flex-wrap:wrap;
  gap:2px;
}

/* League of Legends — heraldic serif, close to "Beaufort for LOL" */
.val-lol{
  font-family:'Cinzel', serif;
  font-weight:600;
  font-size:1.05em;
  letter-spacing:.03em;
  text-transform:none;
}

/* Valorant — condensed bold caps, close to their "Tungsten" face */
.val-valorant{
  font-family:'Oswald', sans-serif;
  font-weight:600;
  font-size:.92em;
  letter-spacing:.05em;
  text-transform:uppercase;
}

.val-sep{
  font-family:'JetBrains Mono', monospace;
  color:var(--muted);
  font-size:.7em;
  margin:0 4px;
}

@media (max-width:480px){
  .card-val{font-size:22px;}
}
</style>
</head>
